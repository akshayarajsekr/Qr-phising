  <!-- QR code pattern inside shield -->
  <!-- Top-left block -->
  <rect x="175" y="175" width="50" height="50" rx="6" fill="#ffffff"/>
  <rect x="183" y="183" width="34" height="34" rx="4" fill="#1e3a8a"/>
  <rect x="191" y="191" width="18" height="18" rx="2" fill="#ffffff"/>

  <!-- Top-right block -->
  <rect x="287" y="175" width="50" height="50" rx="6" fill="#ffffff"/>
  <rect x="295" y="183" width="34" height="34" rx="4" fill="#1e3a8a"/>
  <rect x="303" y="191" width="18" height="18" rx="2" fill="#ffffff"/>

  <!-- Bottom-left block -->
  <rect x="175" y="287" width="50" height="50" rx="6" fill="#ffffff"/>
  <rect x="183" y="295" width="34" height="34" rx="4" fill="#1e3a8a"/>
  <rect x="191" y="303" width="18" height="18" rx="2" fill="#ffffff"/>

  <!-- Center dots -->
  <rect x="247" y="191" width="18" height="18" rx="3" fill="#60a5fa"/>
  <rect x="247" y="215" width="18" height="10" rx="3" fill="#60a5fa"/>
  <rect x="271" y="247" width="18" height="18" rx="3" fill="#60a5fa"/>
  <rect x="247" y="247" width="18" height="18" rx="3" fill="#60a5fa"/>
  <rect x="295" y="247" width="18" height="10" rx="3" fill="#60a5fa"/>
  <rect x="295" y="263" width="18" height="18" rx="3" fill="#60a5fa"/>
  <rect x="271" y="295" width="18" height="18" rx="3" fill="#60a5fa"/>
  <rect x="247" y="271" width="10" height="18" rx="3" fill="#60a5fa"/>

  <!-- Checkmark at bottom of shield -->
  <path d="M220 310 L245 335 L295 280" stroke="#4ade80" stroke-width="16"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
